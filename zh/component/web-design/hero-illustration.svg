<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background shapes -->
  <circle cx="650" cy="100" r="150" fill="#5886F9" fill-opacity="0.08"/>
  <circle cx="150" cy="400" r="120" fill="#7c5cdd" fill-opacity="0.06"/>
  
  <!-- Browser window -->
  <rect x="180" y="80" width="440" height="320" rx="16" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Browser chrome -->
  <rect x="180" y="80" width="440" height="40" rx="16" fill="#F9FAFB"/>
  <rect x="180" y="104" width="440" height="16" fill="#F9FAFB"/>
  <line x1="180" y1="120" x2="620" y2="120" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Traffic lights -->
  <circle cx="210" cy="100" r="6" fill="#FCA5A5"/>
  <circle cx="232" cy="100" r="6" fill="#FCD34D"/>
  <circle cx="254" cy="100" r="6" fill="#86EFAC"/>
  
  <!-- Address bar -->
  <rect x="280" y="92" width="320" height="16" rx="8" fill="#E5E7EB"/>
  
  <!-- Content blocks inside browser -->
  <rect x="220" y="150" width="200" height="16" rx="8" fill="#E5E7EB"/>
  <rect x="220" y="180" width="360" height="100" rx="12" fill="#F3F5F8"/>
  <rect x="240" y="200" width="120" height="12" rx="6" fill="#D1D5DB"/>
  <rect x="240" y="220" width="200" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="240" y="236" width="160" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="240" y="256" width="80" height="12" rx="6" fill="#5886F9" fill-opacity="0.2"/>
  
  <!-- Card blocks -->
  <rect x="220" y="300" width="100" height="80" rx="10" fill="#F3F5F8"/>
  <rect x="240" y="320" width="60" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="240" y="336" width="40" height="6" rx="3" fill="#F3F5F8"/>
  
  <rect x="340" y="300" width="100" height="80" rx="10" fill="#F3F5F8"/>
  <rect x="360" y="320" width="60" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="360" y="336" width="40" height="6" rx="3" fill="#F3F5F8"/>
  
  <rect x="460" y="300" width="100" height="80" rx="10" fill="#F3F5F8"/>
  <rect x="480" y="320" width="60" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="480" y="336" width="40" height="6" rx="3" fill="#F3F5F8"/>
  
  <!-- Floating design elements -->
  <rect x="680" y="200" width="60" height="60" rx="12" fill="#5886F9" fill-opacity="0.1" stroke="#5886F9" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="710" cy="230" r="12" fill="white" stroke="#5886F9" stroke-width="2"/>
  <line x1="710" y1="230" x2="710" y2="210" stroke="#5886F9" stroke-width="2"/>
  <line x1="710" y1="230" x2="730" y2="230" stroke="#5886F9" stroke-width="2"/>
  <circle cx="710" cy="210" r="4" fill="white" stroke="#5886F9" stroke-width="2"/>
  <circle cx="730" cy="230" r="4" fill="white" stroke="#5886F9" stroke-width="2"/>
  
  <!-- Color palette floating -->
  <rect x="80" y="160" width="48" height="48" rx="10" fill="#FCA5A5" fill-opacity="0.3"/>
  <rect x="90" y="170" width="48" height="48" rx="10" fill="#FCD34D" fill-opacity="0.3"/>
  <rect x="100" y="180" width="48" height="48" rx="10" fill="#86EFAC" fill-opacity="0.3"/>
  
  <!-- Cursor -->
  <path d="M640 320 L640 360 L655 345 L670 360 L675 355 L660 340 L675 325 Z" fill="#373C4D" fill-opacity="0.8"/>
</svg>
